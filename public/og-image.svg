<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="#020209"/>

  <!-- Background grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#ffffff" stroke-opacity="0.03"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#ffffff" stroke-opacity="0.03"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#ffffff" stroke-opacity="0.03"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#ffffff" stroke-opacity="0.03"/>

  <!-- Glow blobs -->
  <ellipse cx="200" cy="315" rx="280" ry="220" fill="#2563eb" fill-opacity="0.07"/>
  <ellipse cx="1000" cy="315" rx="220" ry="180" fill="#7c3aed" fill-opacity="0.06"/>

  <!-- ECG pulse logo -->
  <polyline points="60,315 110,315 130,260 150,370 170,315 200,315 340,315"
    stroke="#3b82f6" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Logo text -->
  <text x="80" y="120" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="800" fill="#ffffff" letter-spacing="-1">Energy<tspan fill="#60a5fa">Deal</tspan></text>
  <text x="80" y="148" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#475569" letter-spacing="2">CRM PARA ASESORES ENERGÉTICOS</text>

  <!-- Divider -->
  <line x1="80" y1="175" x2="400" y2="175" stroke="#2563eb" stroke-opacity="0.3" stroke-width="1"/>

  <!-- Main headline -->
  <text x="80" y="250" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="800" fill="#ffffff" letter-spacing="-2">Compara tarifas de</text>
  <text x="80" y="314" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="800" fill="#60a5fa" letter-spacing="-2">luz y gas</text>
  <text x="80" y="378" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="800" fill="#ffffff" letter-spacing="-2">para tus clientes</text>

  <!-- Subtitle -->
  <text x="80" y="430" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#64748b">Gestión de cartera · Comisiones · RGPD · OCR de facturas</text>

  <!-- Feature pills -->
  <rect x="80" y="470" width="190" height="40" rx="20" fill="#2563eb" fill-opacity="0.12" stroke="#2563eb" stroke-opacity="0.35" stroke-width="1"/>
  <text x="175" y="496" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#60a5fa" text-anchor="middle">CRM Energético</text>

  <rect x="288" y="470" width="220" height="40" rx="20" fill="#7c3aed" fill-opacity="0.12" stroke="#7c3aed" stroke-opacity="0.35" stroke-width="1"/>
  <text x="398" y="496" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#a78bfa" text-anchor="middle">Comparador Tarifas</text>

  <rect x="526" y="470" width="230" height="40" rx="20" fill="#059669" fill-opacity="0.1" stroke="#059669" stroke-opacity="0.35" stroke-width="1"/>
  <text x="641" y="496" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#34d399" text-anchor="middle">Control Comisiones</text>

  <!-- URL -->
  <text x="80" y="578" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#334155">energydeal.es</text>

  <!-- Right side visual -->
  <rect x="820" y="80" width="320" height="180" rx="16" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="840" y="116" font-family="system-ui, sans-serif" font-size="11" fill="#475569" letter-spacing="1">AHORRO ESTIMADO</text>
  <text x="840" y="166" font-family="system-ui, sans-serif" font-size="44" font-weight="800" fill="#34d399">-23%</text>
  <text x="840" y="196" font-family="system-ui, sans-serif" font-size="13" fill="#475569">sobre tarifa actual del cliente</text>
  <line x1="840" y1="216" x2="1120" y2="216" stroke="#1e293b" stroke-width="1"/>
  <text x="840" y="242" font-family="system-ui, sans-serif" font-size="12" fill="#334155">CUPS: ES0021000012345678UP</text>

  <rect x="820" y="290" width="320" height="140" rx="16" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="840" y="326" font-family="system-ui, sans-serif" font-size="11" fill="#475569" letter-spacing="1">COMISIONES DEL MES</text>
  <text x="840" y="372" font-family="system-ui, sans-serif" font-size="40" font-weight="800" fill="#60a5fa">2.840€</text>
  <text x="840" y="398" font-family="system-ui, sans-serif" font-size="12" fill="#334155">+18% vs mes anterior · 14 contratos</text>

  <rect x="820" y="460" width="320" height="110" rx="16" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="840" y="496" font-family="system-ui, sans-serif" font-size="11" fill="#475569" letter-spacing="1">CARTERA ACTIVA</text>
  <text x="840" y="538" font-family="system-ui, sans-serif" font-size="40" font-weight="800" fill="#ffffff">127</text>
  <text x="940" y="538" font-family="system-ui, sans-serif" font-size="16" fill="#475569"> clientes · 284 CUPS</text>
</svg>
