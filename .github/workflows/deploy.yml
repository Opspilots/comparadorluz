name: Deploy energydeal
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-energydeal
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }

      - name: Install & Build (Vite)
        run: |
          npm ci --legacy-peer-deps
          npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Rsync dist
        run: |
          rsync -avz --delete -e "ssh -i ~/.ssh/id_ed25519" \
            ./dist/ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/energydeal/dist/

      - name: Reload nginx
        run: ssh -i ~/.ssh/id_ed25519 ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "sudo /usr/bin/systemctl reload nginx"