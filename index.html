    <!-- Self-hosted Outfit font (see src/shared/lib/fonts.ts and src/index.css).
         Google Fonts CDN removed — was render-blocking and loaded 6 weights,
         one of which (300/light) is never used anywhere in the codebase.
         Only the weight needed for the very first paint (800 — Hero H1 +
         nav logo, both font-extrabold) is preloaded here; 400/500/600/700
         load via the normal @fontsource stylesheet imports in fonts.ts. -->
    <link rel="preload" href="/fonts/outfit-800.woff2" as="font" type="font/woff2" crossorigin />
